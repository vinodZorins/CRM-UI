
<div class="container mt-5" style="max-width: 400px;">
    <h3 class="text-center mb-4">CRM Login</h3>

  <form (ngSubmit)="login()">
    <div class="mb-3">
      <input type="email" class="form-control" placeholder="Enter Email" [(ngModel)]="email" name="email" required>
    </div>
    <div>
        <input type="password" class="form-control" placeholder="Enter Password" [(ngModel)]="password" name="password" required>
    </div>

    <br><br>
    <button class="btn btn-primary w-100">Login</button>

    <div class="text-danger mt-3 text-center" *ngIf="errorMessage">{{ errorMessage }}</div>
  </form>
</div>
