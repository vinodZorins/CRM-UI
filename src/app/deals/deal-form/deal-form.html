<div class="form-container">

  <mat-card class="form-card">

    <div class="form-header">
      <h2>{{ isEdit ? 'Edit Deal' : 'Create Deal' }}</h2>
    </div>

    <form *ngIf="form" [formGroup]="form">

      <!-- TITLE -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Deal Title</mat-label>
        <input matInput formControlName="title" />
        <mat-error *ngIf="form.get('title')?.hasError('required')">
          Title is required
        </mat-error>
      </mat-form-field>

      <!-- AMOUNT -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Amount</mat-label>
        <input matInput type="number" formControlName="amount" />
        <mat-error *ngIf="form.get('amount')?.hasError('required')">
          Amount required
        </mat-error>
        <mat-error *ngIf="form.get('amount')?.hasError('min')">
          Must be greater than 0
        </mat-error>
      </mat-form-field>

      <!-- STAGE -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Stage</mat-label>
        <mat-select formControlName="stage">
          <mat-option *ngFor="let s of stages" [value]="s">
            {{ s }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <!-- CUSTOMER -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Select Customer</mat-label>

        <mat-select formControlName="customerId" name="customerId" required>

          <mat-option *ngFor="let c of customers" [value]="c.id">
            {{ c.name  || c.displayNamePrimary }}
          </mat-option>

        </mat-select>

        <mat-error *ngIf="!deal.customerId">
          Customer is required
        </mat-error>

      </mat-form-field>

      <!-- DESCRIPTION -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput rows="3" formControlName="description"></textarea>
      </mat-form-field>

      <!-- ACTIONS -->
      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit">
          <mat-icon>save</mat-icon>
          {{ isEdit ? 'Update' : 'Create' }}
        </button>

        <button mat-stroked-button type="button" routerLink="/deals">
          Cancel
        </button>
      </div>

    </form>

  </mat-card>

</div>
