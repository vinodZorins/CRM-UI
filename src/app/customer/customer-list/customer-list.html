<div class="page">

  <div class="page-header">
    <h2>Customers</h2>

    <button mat-raised-button color="primary" routerLink="/customer-form">
      + Add Customer
    </button>
  </div>

    <mat-form-field appearance="outline" class="search-box">
      <mat-label>Search</mat-label>
      <input matInput [(ngModel)]="search" (input)="onSearchChange()">
    </mat-form-field>
  <!-- TABLE -->
  <table mat-table [dataSource]="customers" class="mat-elevation-z8">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let c">{{ c.name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let c">{{ c.email }}</td>
    </ng-container>

    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef>Phone</th>
      <td mat-cell *matCellDef="let c">{{ c.phone }}</td>
    </ng-container>

    <ng-container matColumnDef="company">
      <th mat-header-cell *matHeaderCellDef>Company</th>
      <td mat-cell *matCellDef="let c">{{ c.companyName }}</td>
    </ng-container>

    <ng-container matColumnDef="requirement">
      <th mat-header-cell *matHeaderCellDef>Requirement</th>
      <td mat-cell *matCellDef="let c">{{ c.requirement }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['name','email','phone','company','requirement']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['name','email','phone','company','requirement'];"></tr>
  </table>

  <!-- PAGINATOR -->
  <mat-paginator
    [length]="totalElements"
    [pageSize]="size"
    (page)="onPageChange($event)">
  </mat-paginator>

</div>
