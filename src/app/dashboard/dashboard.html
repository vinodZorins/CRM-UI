<div class="dashboard-container">
  <h2>Leads Overview</h2>

  <!-- 4-column grid layout -->
  <mat-grid-list cols="4" rowHeight="150px" gutterSize="16px">
    
    <!-- Widget 1: Total Leads -->
    <mat-grid-tile>
      <mat-card class="dashboard-card" routerLink="/leads" style="cursor: pointer;">
        <mat-card-header>
          <mat-card-title>Total Leads</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <h1 class="bold-number">{{ dashboardData?.totalLeads}}</h1>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <!-- Widget 2: New Leads Today -->
    <mat-grid-tile>
      <mat-card class="dashboard-card status-new" routerLink="/leads" style="cursor: pointer;">
        <mat-card-header>
          <mat-card-title>New Leads</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <h1 class="bold-number">{{ dashboardData?.newLeads}}</h1>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <!-- Widget 3: Conversion Rate -->
    <mat-grid-tile>
      <mat-card class="dashboard-card" routerLink="/leads" style="cursor: pointer;">
        <mat-card-header>
          <mat-card-title>Conversion</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <h1 class="bold-number">{{ dashboardData?.conversionRate}}%</h1>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <!-- Widget 4: Quick Action -->
    <mat-grid-tile>
      <mat-card class="dashboard-card action-card">
        <mat-card-content>
          <button mat-raised-button color="primary" routerLink="/lead-form">
            + Add New Lead
          </button>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

  </mat-grid-list>

  
  <div class="filter-bar">

    <!-- COMPANY -->
      <mat-label>Company</mat-label>
      <select [(ngModel)]="selectedCompany" (selectionChange)="onFilterChange()">
        <option value="">All Companies</option>
        <option *ngFor="let c of companies" [value]="c.id">
          {{ c.companyName }}
        </option>
      </select>

    <!-- START DATE -->
      <mat-label>Start Date</mat-label>
      <input matInput type="date" [(ngModel)]="startDate" (change)="onFilterChange()">

    <!-- END DATE -->
      <mat-label>End Date</mat-label>
      <input matInput type="date" [(ngModel)]="endDate" (change)="onFilterChange()">

    <!-- QUICK BUTTONS -->
    <div class="quick-buttons">
      <button mat-stroked-button (click)="setToday()">Today</button>
      <button mat-stroked-button (click)="setLast7Days()">7 Days</button>
      <button mat-stroked-button (click)="setLast30Days()">30 Days</button>
      <button mat-button color="warn" (click)="resetFilters()">Reset</button>
    </div>

  </div>

  <div class="charts-container">

    <!-- PIE -->
    <div class="chart-box">
      <h3>Leads Distribution</h3>
      <canvas id="pieChart"></canvas>
    </div>

    <!-- BAR -->
    <div class="chart-box">
      <h3>Leads Overview</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box full-width">
      <h3>Monthly Leads</h3>
      <canvas id="lineChart"></canvas>
    </div>

  </div>
  
</div>
