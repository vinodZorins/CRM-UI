<mat-sidenav-container class="crm-container">

  <!-- SIDEBAR -->
  <mat-sidenav
    mode="side"
    opened
    [class.collapsed]="isCollapsed"
    class="crm-sidebar"
  >

    <!-- LOGO -->
    <div class="crm-logo">
      <mat-icon class="logo-icon">hub</mat-icon>
      <span class="logo-text">CRM</span>
    </div>

    <!-- NAV -->
    <mat-nav-list>

      <!-- ===== SALES MODULE ===== -->
      <div class="module-title" (click)="toggleModule('sales')">
        <mat-icon>expand_more</mat-icon>
        <span>Sales</span>
      </div>

      <div *ngIf="modules.sales">

        <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>

        <a mat-list-item routerLink="/leads" routerLinkActive="active">
          <mat-icon matListItemIcon>trending_up</mat-icon>
          <span matListItemTitle>Leads</span>
        </a>

        <a mat-list-item routerLink="/customer" routerLinkActive="active">
          <mat-icon matListItemIcon>person</mat-icon>
          <span matListItemTitle>Customers</span>
        </a>

        <a mat-list-item routerLink="/deals" routerLinkActive="active">
          <mat-icon matListItemIcon>attach_money</mat-icon>
          <span matListItemTitle>Deals</span>

          <!-- BADGE -->
          <span class="badge">5</span>
        </a>

      </div>

      <!-- ===== MARKETING MODULE ===== -->
      <div class="module-title" (click)="toggleModule('marketing')">
        <mat-icon>expand_more</mat-icon>
        <span>Marketing</span>
      </div>

      <div *ngIf="modules.marketing">

        <a mat-list-item routerLink="/campaigns" routerLinkActive="active">
          <mat-icon matListItemIcon>campaign</mat-icon>
          <span matListItemTitle>Campaigns</span>
        </a>

        <a mat-list-item routerLink="/visits" routerLinkActive="active">
          <mat-icon matListItemIcon>place</mat-icon>
          <span matListItemTitle>Visits</span>
        </a>

      </div>

      <!-- ===== SUPPORT MODULE ===== -->
      <div class="module-title" (click)="toggleModule('support')">
        <mat-icon>expand_more</mat-icon>
        <span>Support</span>
      </div>

      <div *ngIf="modules.support">

        <a mat-list-item routerLink="/tasks" routerLinkActive="active">
          <mat-icon matListItemIcon>task</mat-icon>
          <span matListItemTitle>Tasks</span>
          <span class="badge red">3</span>
        </a>

        <a mat-list-item routerLink="/calls" routerLinkActive="active">
          <mat-icon matListItemIcon>phone</mat-icon>
          <span matListItemTitle>Calls</span>
        </a>

        <a mat-list-item routerLink="/meetings" routerLinkActive="active">
          <mat-icon matListItemIcon>event</mat-icon>
          <span matListItemTitle>Meetings</span>
        </a>

      </div>

    </mat-nav-list>

  </mat-sidenav>

      <span class="page-title">CRM</span>

      <span class="spacer"></span>

      <!-- PROFILE DROPDOWN -->
      <div class="profile" [matMenuTriggerFor]="menu">
        <img src="https://i.pravatar.cc/40" class="avatar">
        <span>Vinod</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </div>

      <mat-menu #menu="matMenu">
        <button mat-menu-item>Profile</button>
        <button mat-menu-item>Settings</button>
        <button mat-menu-item (click)="logout()">Logout</button>
      </mat-menu>

    

    <div class="crm-content">
      <router-outlet></router-outlet>
    </div>

  <!-- CONTENT -->
  <mat-sidenav-content>

    <!-- TOPBAR -->
    <mat-toolbar class="crm-toolbar">

      <!-- TOGGLE BUTTON -->
      <button mat-icon-button (click)="toggleSidebar()">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="page-title">CRM</span>

      <span class="spacer"></span>

      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>

      <button mat-stroked-button color="warn" (click)="logout()">
        Logout
      </button>

    </mat-toolbar>

    <!-- CONTENT -->
    <div class="crm-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
