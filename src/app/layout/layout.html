<mat-sidenav-container class="crm-container">

  <!-- Sidebar -->
  <mat-sidenav mode="side" opened class="crm-sidebar">
    <h2>CRM</h2>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <div div class="link-content">
        <mat-icon>dashboard</mat-icon>
        <span class="link-text">Dashboard</span>
        </div>
      </a>

      <a mat-list-item routerLink="/users" routerLinkActive="active">
        <div div class="link-content">
        <mat-icon>groups</mat-icon>
        <span class="link-text">Users</span>
        </div>
      </a>

      <a mat-list-item routerLink="/leads" routerLinkActive="active">
        <div class="link-content">
        <mat-icon>trending_up</mat-icon>
        <span class="link-text">Leads</span>
        </div>
      </a>

      <a mat-list-item routerLink="/company" routerLinkActive="active">
        <div class="link-content">
        <mat-icon>business</mat-icon>
        <span class="link-text">Company</span>
        </div>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Content -->
  <mat-sidenav-content>

    <mat-toolbar>
      <span>CRM</span>
      <span class="spacer"></span>

      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>

      <button mat-stroked-button color="warn" (click)="logout()">
        Logout
      </button>
    </mat-toolbar>

    <div class="crm-content">
      <router-outlet></router-outlet> 
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
